name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Django lint + tests ────────────────────────────────────────────────────
  django:
    name: Django (lint + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: stockdb_test
          POSTGRES_USER: stockuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: project.settings
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: stockdb_test
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: testpass
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_DEBUG: "1"
      REDIS_URL: redis://localhost:6379/0

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: web/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; ignore long lines in migrations
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --exclude=migrations --statistics

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest stocks/tests.py -v --tb=short

  # ── React frontend build ───────────────────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ── Docker Compose smoke test ──────────────────────────────────────────────
  docker:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: [django, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build images
        run: docker compose build web frontend nginx

      - name: Start services (db + redis + web)
        run: docker compose up -d db redis web

      - name: Wait for web to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/sectors/ 2>/dev/null; then
              echo "Web is up"
              break
            fi
            echo "Waiting… ($i/30)"
            sleep 3
          done

      - name: Basic API smoke test
        run: |
          curl -sf http://localhost:8000/api/v1/listings/ | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'count' in d"
          curl -sf http://localhost:8000/api/v1/etfs/popular/ | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'XGRO' in d"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs web
