---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-dags-pvc
  namespace: equities
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: equities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
        - name: airflow-init
          image: equities/airflow:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              airflow db init
              airflow users create --username admin --firstname Admin --lastname User \
                --role Admin --email admin@example.com \
                --password $(AIRFLOW_ADMIN_PASSWORD) || true
          envFrom:
            - configMapRef:
                name: equities-config
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_DB }
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: AIRFLOW_ADMIN_PASSWORD }
      containers:
        - name: webserver
          image: equities/airflow:latest
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: equities-config
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: AIRFLOW_SECRET_KEY }
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_DB }
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/user_dags
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: equities
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: scheduler
          image: equities/airflow:latest
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: equities-config
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: AIRFLOW_SECRET_KEY }
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: equities-secrets, key: POSTGRES_DB }
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/user_dags
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: equities
spec:
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
