---
# ── Airflow PVC for DAGs ──────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-dags-pvc
  namespace: equities
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 200Mi
  storageClassName: standard
---
# ── Shared Airflow env (used by all Airflow pods) ─────────────────────────────
# Airflow 3 requires the db connection via AIRFLOW__DATABASE__SQL_ALCHEMY_CONN.
# The DAG processor is now a separate process but runs inside the scheduler pod.
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: equities
data:
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
  AIRFLOW__CORE__HOSTNAME_CALLABLE: "airflow.utils.net.get_host_ip_address"
  AIRFLOW__LOGGING__WORKER_LOG_SERVER_HOST: "airflow-scheduler"
  AIRFLOW__API__BASE_URL: "http://airflow-webserver:8080"
  AIRFLOW__API__AUTH_MANAGER: "airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager"
  AIRFLOW__SCHEDULER__RUN_DAG_PROCESSOR: "true"
  AIRFLOW__LOGGING__LOGGING_LEVEL: "INFO"
  AIRFLOW__LOGGING__FAB_LOGGING_LEVEL: "WARNING"
  PYTHONPATH: "/opt/airflow"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
---
# ── Airflow DB init Job ───────────────────────────────────────────────────────
# Runs once on deploy to migrate the Airflow metadata DB and create admin user.
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-db-init
  namespace: equities
  annotations:
    # Re-run on every deploy by changing helm hook equivalent
    "helm.sh/hook": pre-install,pre-upgrade
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: airflow-init
          image: equities/airflow:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              airflow db migrate
              echo "Airflow DB init complete."
          envFrom:
            - configMapRef:
                name: airflow-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_DB
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: AIRFLOW_ADMIN_PASSWORD
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: AIRFLOW_SECRET_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
# ── Airflow Webserver Deployment ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: equities
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: webserver
          image: equities/airflow:latest
          imagePullPolicy: Always
          command: ["airflow", "api-server"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_DB
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: AIRFLOW_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /api/v2/monitor/health
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 10
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      restartPolicy: Always
---
# ── Airflow Scheduler Deployment ──────────────────────────────────────────────
# In Airflow 3, the scheduler runs the DAG processor internally when
# pod is needed with LocalExecutor.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: equities
  labels:
    app: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: scheduler
          image: equities/airflow:latest
          imagePullPolicy: Always
          command: ["airflow", "scheduler"]
          ports:
            - containerPort: 8793
              name: log-server
              protocol: TCP
          envFrom:
            - configMapRef:
                name: airflow-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_DB
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: AIRFLOW_SECRET_KEY
          livenessProbe:
            exec:
              command:
                - airflow
                - jobs
                - check
                - --job-type
                - SchedulerJob
                - --local
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
        - name: dag-processor
          image: equities/airflow:latest
          imagePullPolicy: Always
          command: ["airflow", "dag-processor"]
          envFrom:
            - configMapRef:
                name: airflow-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: POSTGRES_DB
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
            - name: AIRFLOW__API_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: equities-secrets
                  key: AIRFLOW_SECRET_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      restartPolicy: Always
---
# ── Airflow Webserver Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: equities
spec:
  selector:
    app: airflow-webserver
  type: LoadBalancer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# ── Airflow Scheduler Service (for log server on port 8793) ────────────────────
apiVersion: v1
kind: Service
metadata:
  name: airflow-scheduler
  namespace: equities
spec:
  selector:
    app: airflow-scheduler
  type: ClusterIP
  ports:
    - name: log-server
      port: 8793
      targetPort: 8793
